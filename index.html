<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0ea5e9">
  <title>CRM Bakul Sayur</title>

  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f8fafc;
      font-family: Arial, Helvetica, sans-serif;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: #f8fafc;
    }

    #crm-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #f8fafc;
    }

    #loading {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 24px;
      color: #334155;
      background: #f8fafc;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    #loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 4px solid #e2e8f0;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .loading-text {
      margin: 0;
      max-width: 360px;
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
      color: #64748b;
    }

    .open-direct {
      color: #0284c7;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 767px) and (orientation: portrait) {
      .app-shell {
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <div id="loading" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <p class="loading-title">Memuat CRM Bakul Sayur</p>
      <p class="loading-text">
        Mohon tunggu. Apabila halaman tidak terbuka, gunakan tautan langsung di bawah.
      </p>
      <a
        class="open-direct"
        href="https://script.google.com/macros/s/AKfycbxho2go89HodgXxllBk0VimBlsWtmwsgVWdEqNZrULZIuh9xW7hVndKTQgPemWpoKZm/exec"
        target="_blank"
        rel="noopener noreferrer"
      >
        Buka Web App Langsung
      </a>
    </div>

    <iframe
      id="crm-frame"
      src="https://script.google.com/macros/s/AKfycbxho2go89HodgXxllBk0VimBlsWtmwsgVWdEqNZrULZIuh9xW7hVndKTQgPemWpoKZm/exec"
      title="CRM Bakul Sayur"
      allow="web-share; clipboard-write"
      referrerpolicy="strict-origin-when-cross-origin"
      loading="eager"
    ></iframe>
  </main>

  <script>
    (() => {
      const frame = document.getElementById('crm-frame');
      const loading = document.getElementById('loading');

      frame.addEventListener('load', () => {
        window.setTimeout(() => {
          loading.classList.add('hidden');
        }, 350);
      });

      window.setTimeout(() => {
        loading.classList.add('hidden');
      }, 12000);
    })();
  </script>
</body>
</html>
